services:
  # ── Unit test services (target: tester stage) ──
  javascript-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/javascript-wrapper/Dockerfile
      target: tester

  python-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/python-wrapper/Dockerfile
      target: tester

  ruby-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/ruby-wrapper/Dockerfile
      target: tester

  java-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/java-wrapper/Dockerfile
      target: tester

  php-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/php-wrapper/Dockerfile
      target: tester

  go-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/go-wrapper/Dockerfile
      target: tester

  dart-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/dart-wrapper/Dockerfile
      target: tester

  flutter-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/flutter-wrapper/Dockerfile
      target: tester

  swift-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/swift-wrapper/Dockerfile
      target: tester

  rust-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/rust-wrapper/Dockerfile
      target: tester

  dotnet-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/dotnet-wrapper/Dockerfile
      target: tester

  elixir-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/elixir-wrapper/Dockerfile
      target: tester

  scala-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/scala-wrapper/Dockerfile
      target: tester

  kotlin-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/kotlin-wrapper/Dockerfile
      target: tester

  cpp-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/cpp-wrapper/Dockerfile
      target: tester

  liquid-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/liquid-wrapper/Dockerfile
      target: tester

  react-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/react-wrapper/Dockerfile
      target: tester

  vue2-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/vue2-wrapper/Dockerfile
      target: tester

  vue3-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/vue3-wrapper/Dockerfile
      target: tester

  angular-unit:
    init: true
    build:
      context: ..
      dockerfile: cross-sdk-tests/angular-wrapper/Dockerfile
      target: tester

  # ── Cross-SDK test services (final server stage) ──
  javascript-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/javascript-wrapper/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - SDK_NAME=javascript

  python-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/python-wrapper/Dockerfile
    ports:
      - "3002:3000"
    environment:
      - SDK_NAME=python

  ruby-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/ruby-wrapper/Dockerfile
    ports:
      - "3003:3000"
    environment:
      - SDK_NAME=ruby

  java-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/java-wrapper/Dockerfile
    ports:
      - "3004:3000"
    environment:
      - SDK_NAME=java

  php-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/php-wrapper/Dockerfile
    ports:
      - "3005:3000"
    environment:
      - SDK_NAME=php

  go-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/go-wrapper/Dockerfile
    ports:
      - "3006:3000"
    environment:
      - SDK_NAME=go

  liquid-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/liquid-wrapper/Dockerfile
    ports:
      - "3007:3000"
    environment:
      - SDK_NAME=liquid

  dart-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/dart-wrapper/Dockerfile
    ports:
      - "3011:3000"
    environment:
      - SDK_NAME=dart

  flutter-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/flutter-wrapper/Dockerfile
    ports:
      - "3008:3000"
    environment:
      - SDK_NAME=flutter

  swift-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/swift-wrapper/Dockerfile
    ports:
      - "3010:3000"
    environment:
      - SDK_NAME=swift

  dotnet-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/dotnet-wrapper/Dockerfile
    ports:
      - "3009:3000"
    environment:
      - SDK_NAME=dotnet

  react-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/react-wrapper/Dockerfile
    ports:
      - "3012:3000"
    environment:
      - SDK_NAME=react

  vue2-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/vue2-wrapper/Dockerfile
    ports:
      - "3013:3000"
    environment:
      - SDK_NAME=vue2

  vue3-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/vue3-wrapper/Dockerfile
    ports:
      - "3014:3000"
    environment:
      - SDK_NAME=vue3

  rust-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/rust-wrapper/Dockerfile
    ports:
      - "3015:3000"
    environment:
      - SDK_NAME=rust

  elixir-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/elixir-wrapper/Dockerfile
    ports:
      - "3016:3000"
    environment:
      - SDK_NAME=elixir

  scala-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/scala-wrapper/Dockerfile
    ports:
      - "3017:3000"
    environment:
      - SDK_NAME=scala

  kotlin-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/kotlin-wrapper/Dockerfile
    ports:
      - "3018:3000"
    environment:
      - SDK_NAME=kotlin

  angular-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/angular-wrapper/Dockerfile
    ports:
      - "3019:3000"
    environment:
      - SDK_NAME=angular

  cpp-sdk:
    build:
      context: ..
      dockerfile: cross-sdk-tests/cpp-wrapper/Dockerfile
    ports:
      - "3020:3000"
    environment:
      - SDK_NAME=cpp

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    depends_on:
      - javascript-sdk
      - python-sdk
      - ruby-sdk
      - java-sdk
      - php-sdk
      - go-sdk
      - liquid-sdk
      - dart-sdk
      - flutter-sdk
      - swift-sdk
      - dotnet-sdk
      - react-sdk
      - vue2-sdk
      - vue3-sdk
      - rust-sdk
      - elixir-sdk
      - scala-sdk
      - kotlin-sdk
      - angular-sdk
      - cpp-sdk
    volumes:
      - ./test_scenarios_complete.json:/test_scenarios_complete.json:ro
      - ./test-results:/results
    environment:
      - PYTHONUNBUFFERED=1
